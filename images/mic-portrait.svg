<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 280" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ff7a3a"/>
      <stop offset="100%" stop-color="#b52b00"/>
    </linearGradient>
    <pattern id="dots" x="0" y="0" width="12" height="12" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1" fill="rgba(255,255,255,0.18)"/>
    </pattern>
  </defs>
  <rect width="220" height="280" fill="url(#bg)"/>
  <rect width="220" height="280" fill="url(#dots)"/>

  <!-- Microphone silhouette -->
  <g transform="translate(110, 130)">
    <!-- mic body -->
    <rect x="-22" y="-55" width="44" height="70" rx="22" ry="22" fill="#1a0a00" stroke="#fff" stroke-width="2"/>
    <!-- grille lines -->
    <line x1="-18" y1="-45" x2="18" y2="-45" stroke="#ff5a1f" stroke-width="1.5"/>
    <line x1="-18" y1="-35" x2="18" y2="-35" stroke="#ff5a1f" stroke-width="1.5"/>
    <line x1="-18" y1="-25" x2="18" y2="-25" stroke="#ff5a1f" stroke-width="1.5"/>
    <line x1="-18" y1="-15" x2="18" y2="-15" stroke="#ff5a1f" stroke-width="1.5"/>
    <line x1="-18" y1="-5" x2="18" y2="-5" stroke="#ff5a1f" stroke-width="1.5"/>
    <!-- stem -->
    <rect x="-3" y="15" width="6" height="50" fill="#1a0a00" stroke="#fff" stroke-width="2"/>
    <!-- base -->
    <rect x="-30" y="65" width="60" height="8" rx="2" fill="#1a0a00" stroke="#fff" stroke-width="2"/>
  </g>

  <!-- Sound waves -->
  <g fill="none" stroke="#fff" stroke-width="2" opacity="0.7">
    <path d="M 35 110 Q 20 130 35 150"/>
    <path d="M 25 100 Q 5 130 25 160"/>
    <path d="M 185 110 Q 200 130 185 150"/>
    <path d="M 195 100 Q 215 130 195 160"/>
  </g>

  <!-- Label text -->
  <text x="110" y="250" text-anchor="middle" fill="#fff" font-family="Courier New, monospace" font-size="11" letter-spacing="2">
    ON THE RECORD
  </text>
</svg>
