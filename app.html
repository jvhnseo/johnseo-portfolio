<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>The Question Generator — John Seo</title>
  <style>
    /* ====== Single-file web app ====== */
    * { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0e0a07;
      --paper: #f4efe6;
      --accent: #ff5a1f;
      --accent-soft: rgba(255, 90, 31, 0.12);
      --ink: #1a0a00;
      --mute: #8a8175;
      --line: rgba(255,255,255,0.08);
      --font-serif: Georgia, 'Times New Roman', serif;
      --font-mono: 'Courier New', Courier, monospace;
    }

    body {
      font-family: var(--font-mono);
      background-color: var(--bg);
      color: var(--paper);
      min-height: 100vh;
      background-image:
        radial-gradient(circle at 80% 10%, rgba(255,90,31,0.18) 0%, transparent 45%),
        radial-gradient(circle at 10% 90%, rgba(255,90,31,0.08) 0%, transparent 50%);
      padding: 40px 20px;
    }

    /* Top bar */
    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      max-width: 760px;
      margin: 0 auto 40px;
      padding-bottom: 20px;
      border-bottom: 1px solid var(--line);
    }
    .topbar .logo {
      font-family: var(--font-serif);
      font-size: 22px;
      color: var(--paper);
    }
    .topbar .logo em {
      color: var(--accent);
      font-style: italic;
    }
    .topbar a {
      color: var(--paper);
      text-decoration: none;
      font-size: 12px;
      letter-spacing: 2px;
      border-bottom: 1px dashed var(--mute);
      padding-bottom: 3px;
    }
    .topbar a:hover {
      color: var(--accent);
      border-bottom-color: var(--accent);
    }

    /* Main card */
    .card {
      max-width: 760px;
      margin: 0 auto;
      background-color: var(--paper);
      color: var(--ink);
      border-radius: 14px;
      padding: 44px 44px 36px;
      box-shadow: 20px 20px 0 rgba(255,90,31,0.2);
      position: relative;
    }

    .card::before {
      content: "REC";
      position: absolute;
      top: 20px;
      right: 24px;
      background: var(--accent);
      color: #fff;
      font-family: var(--font-mono);
      font-size: 11px;
      padding: 4px 10px;
      border-radius: 3px;
      letter-spacing: 2px;
    }

    .card::after {
      content: "";
      position: absolute;
      top: 28px;
      right: 62px;
      width: 8px;
      height: 8px;
      background: var(--accent);
      border-radius: 50%;
      animation: blink 1.3s infinite;
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.2; }
    }

    .eyebrow {
      font-size: 12px;
      letter-spacing: 3px;
      color: var(--accent);
      margin-bottom: 12px;
    }

    h1 {
      font-family: var(--font-serif);
      font-size: 42px;
      line-height: 1.05;
      letter-spacing: -1px;
      color: var(--ink);
      margin-bottom: 10px;
    }
    h1 em {
      color: var(--accent);
      font-style: italic;
    }

    .sub {
      font-family: var(--font-serif);
      font-style: italic;
      color: #555;
      font-size: 17px;
      margin-bottom: 32px;
    }

    /* Controls */
    .label {
      font-size: 11px;
      letter-spacing: 3px;
      color: var(--ink);
      margin: 24px 0 10px;
      display: block;
    }

    .chips {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-bottom: 4px;
    }

    .chip {
      font-family: var(--font-mono);
      font-size: 13px;
      padding: 10px 16px;
      background: transparent;
      border: 1.5px solid var(--ink);
      color: var(--ink);
      cursor: pointer;
      border-radius: 999px;
      letter-spacing: 1px;
      transition: all 0.15s;
    }
    .chip:hover {
      background: var(--accent-soft);
    }
    .chip.active {
      background: var(--ink);
      color: var(--paper);
      border-color: var(--ink);
    }

    .generate {
      margin-top: 32px;
      width: 100%;
      padding: 18px;
      font-family: var(--font-mono);
      font-size: 14px;
      letter-spacing: 3px;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      text-transform: uppercase;
      font-weight: bold;
      transition: all 0.2s;
    }
    .generate:hover {
      background: var(--ink);
      transform: translateY(-2px);
    }
    .generate:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
    }

    /* Question output */
    .output {
      margin-top: 36px;
      padding: 28px;
      background: var(--ink);
      color: var(--paper);
      border-radius: 10px;
      min-height: 140px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      position: relative;
    }
    .output .timestamp {
      position: absolute;
      top: 12px;
      left: 16px;
      font-size: 10px;
      color: var(--mute);
      letter-spacing: 2px;
    }
    .output .question {
      font-family: var(--font-serif);
      font-style: italic;
      font-size: 24px;
      line-height: 1.4;
      color: var(--paper);
      padding: 0 0 16px;
    }
    .output .question::before {
      content: '"';
      color: var(--accent);
      font-size: 60px;
      font-family: var(--font-serif);
      line-height: 0;
      vertical-align: -0.4em;
      margin-right: 6px;
    }
    .output .meta {
      font-size: 11px;
      color: var(--mute);
      letter-spacing: 2px;
      display: flex;
      justify-content: space-between;
      border-top: 1px dashed var(--line);
      padding-top: 12px;
    }

    .output .placeholder {
      font-family: var(--font-serif);
      font-style: italic;
      color: var(--mute);
      font-size: 17px;
      text-align: center;
    }

    .actions {
      display: flex;
      gap: 10px;
      margin-top: 16px;
    }

    .action-btn {
      flex: 1;
      padding: 12px;
      font-family: var(--font-mono);
      font-size: 12px;
      letter-spacing: 2px;
      background: transparent;
      border: 1.5px solid var(--ink);
      color: var(--ink);
      cursor: pointer;
      border-radius: 6px;
      text-transform: uppercase;
    }
    .action-btn:hover {
      background: var(--ink);
      color: var(--paper);
    }
    .action-btn:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }

    /* Log of past questions */
    .log {
      max-width: 760px;
      margin: 40px auto 0;
      padding: 0 8px;
    }

    .log-title {
      font-size: 11px;
      letter-spacing: 3px;
      color: var(--mute);
      margin-bottom: 12px;
    }

    .log-item {
      padding: 12px 16px;
      background: rgba(244, 239, 230, 0.04);
      border-left: 2px solid var(--accent);
      margin-bottom: 8px;
      font-family: var(--font-serif);
      font-style: italic;
      font-size: 15px;
      color: #cfc6b8;
    }

    .log-item .tag {
      display: inline-block;
      font-family: var(--font-mono);
      font-style: normal;
      font-size: 10px;
      color: var(--accent);
      letter-spacing: 2px;
      margin-right: 10px;
    }

    /* Loading spinner */
    .spinner {
      display: inline-block;
      width: 14px;
      height: 14px;
      border: 2px solid transparent;
      border-top-color: currentColor;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      vertical-align: middle;
      margin-right: 8px;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* Error */
    .error {
      color: #ff8a56;
      font-style: italic;
      font-family: var(--font-serif);
      font-size: 15px;
    }

    @media (max-width: 640px) {
      .card { padding: 28px 24px; }
      h1 { font-size: 32px; }
      .output .question { font-size: 19px; }
    }
  </style>
</head>
<body>

  <div class="topbar">
    <div class="logo">John <em>/</em> Seo</div>
    <a href="scratch.html">← BACK TO FIELD NOTES</a>
  </div>

  <main class="card">
    <div class="eyebrow">AI-POWERED · ONE QUESTION AT A TIME</div>
    <h1>The Street Interview <em>Question</em> Generator.</h1>
    <p class="sub">Pick a vibe, pick a topic. I'll hand you a question so weird strangers will actually stop walking.</p>

    <label class="label">01 · VIBE</label>
    <div class="chips" id="vibeChips">
      <button class="chip active" data-vibe="funny">Funny</button>
      <button class="chip" data-vibe="wholesome">Wholesome</button>
      <button class="chip" data-vibe="spicy">Spicy</button>
      <button class="chip" data-vibe="philosophical">Deep</button>
      <button class="chip" data-vibe="chaotic">Chaotic</button>
    </div>

    <label class="label">02 · TOPIC</label>
    <div class="chips" id="topicChips">
      <button class="chip active" data-topic="life">Life</button>
      <button class="chip" data-topic="relationships">Relationships</button>
      <button class="chip" data-topic="money">Money</button>
      <button class="chip" data-topic="faith">Faith</button>
      <button class="chip" data-topic="pop-culture">Pop Culture</button>
      <button class="chip" data-topic="random">Totally Random</button>
    </div>

    <button class="generate" id="generateBtn">Generate a question →</button>

    <div class="output" id="output">
      <span class="timestamp">// 00:00:00</span>
      <div class="placeholder">Pick your vibe, pick your topic, and hit generate.</div>
    </div>

    <div class="actions">
      <button class="action-btn" id="copyBtn" disabled>📋 Copy</button>
      <button class="action-btn" id="saveBtn" disabled>⭐ Save</button>
      <button class="action-btn" id="againBtn" disabled>🔁 Another</button>
    </div>
  </main>

  <div class="log" id="log" style="display:none;">
    <div class="log-title">SAVED QUESTIONS ──────</div>
    <div id="logList"></div>
  </div>

  <script>
    // ====== State ======
    let currentVibe = 'funny';
    let currentTopic = 'life';
    let currentQuestion = null;
    const savedQuestions = [];

    // ====== Chip interactions ======
    function bindChips(containerId, callback) {
      const container = document.getElementById(containerId);
      container.addEventListener('click', (e) => {
        if (!e.target.classList.contains('chip')) return;
        container.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
        e.target.classList.add('active');
        callback(e.target.dataset.vibe || e.target.dataset.topic);
      });
    }
    bindChips('vibeChips', v => currentVibe = v);
    bindChips('topicChips', t => currentTopic = t);

    // ====== Question generation ======
    const btn = document.getElementById('generateBtn');
    const out = document.getElementById('output');
    const copyBtn = document.getElementById('copyBtn');
    const saveBtn = document.getElementById('saveBtn');
    const againBtn = document.getElementById('againBtn');

    async function generate() {
      btn.disabled = true;
      btn.innerHTML = '<span class="spinner"></span>Thinking...';
      out.innerHTML = '<span class="timestamp">// CONNECTING...</span><div class="placeholder">Generating your question...</div>';

      const prompt = `You are a viral street interview host writing ONE question to ask strangers on the street.

Vibe: ${currentVibe}
Topic: ${currentTopic}

Rules:
- Return ONLY the question itself — no quotes, no preamble, no explanation.
- One sentence. Under 20 words.
- Must be something that would actually stop a stranger and get a genuine reaction.
- Keep it G-rated and brand-safe (suitable for a faith-forward creator).
- Be specific and weird, not generic. Avoid "what's your biggest dream" style clichés.
- Sound like a real human, not a corporate interviewer.

Respond with ONLY the question text. Nothing else.`;

      try {
        const response = await fetch("https://api.anthropic.com/v1/messages", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            model: "claude-sonnet-4-20250514",
            max_tokens: 1000,
            messages: [{ role: "user", content: prompt }]
          })
        });

        const data = await response.json();
        const textBlock = data.content.find(b => b.type === 'text');
        let question = textBlock ? textBlock.text.trim() : '';
        // Strip surrounding quotes if model added any
        question = question.replace(/^["'"']|["'"']$/g, '').trim();

        if (!question) throw new Error('No question returned');

        currentQuestion = { text: question, vibe: currentVibe, topic: currentTopic };
        renderQuestion(question);
        copyBtn.disabled = false;
        saveBtn.disabled = false;
        againBtn.disabled = false;

      } catch (err) {
        console.error(err);
        out.innerHTML = `<span class="timestamp">// ERROR</span><div class="error">Couldn't reach the AI. Try again in a sec — or steal one of these: "What's one thing you'd bring back from 2015?"</div>`;
      } finally {
        btn.disabled = false;
        btn.textContent = 'Generate another →';
      }
    }

    function renderQuestion(text) {
      const now = new Date();
      const stamp = String(now.getHours()).padStart(2,'0') + ':' +
                    String(now.getMinutes()).padStart(2,'0') + ':' +
                    String(now.getSeconds()).padStart(2,'0');
      out.innerHTML = `
        <span class="timestamp">// ${stamp} · ${currentVibe.toUpperCase()} · ${currentTopic.toUpperCase()}</span>
        <div class="question">${escapeHTML(text)}</div>
        <div class="meta">
          <span>VIBE: ${currentVibe}</span>
          <span>TOPIC: ${currentTopic}</span>
        </div>
      `;
    }

    function escapeHTML(str) {
      const div = document.createElement('div');
      div.textContent = str;
      return div.innerHTML;
    }

    btn.addEventListener('click', generate);
    againBtn.addEventListener('click', generate);

    // ====== Copy button ======
    copyBtn.addEventListener('click', async () => {
      if (!currentQuestion) return;
      try {
        await navigator.clipboard.writeText(currentQuestion.text);
        copyBtn.textContent = '✓ Copied!';
        setTimeout(() => copyBtn.textContent = '📋 Copy', 1400);
      } catch (e) {
        copyBtn.textContent = 'Copy failed';
      }
    });

    // ====== Save button ======
    saveBtn.addEventListener('click', () => {
      if (!currentQuestion) return;
      savedQuestions.unshift({ ...currentQuestion });
      renderLog();
      saveBtn.textContent = '✓ Saved!';
      setTimeout(() => saveBtn.textContent = '⭐ Save', 1400);
    });

    function renderLog() {
      const logEl = document.getElementById('log');
      const listEl = document.getElementById('logList');
      if (savedQuestions.length === 0) {
        logEl.style.display = 'none';
        return;
      }
      logEl.style.display = 'block';
      listEl.innerHTML = savedQuestions.map(q => `
        <div class="log-item">
          <span class="tag">${q.vibe.toUpperCase()} / ${q.topic.toUpperCase()}</span>
          ${escapeHTML(q.text)}
        </div>
      `).join('');
    }
  </script>
</body>
</html>
